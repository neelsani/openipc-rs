name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENIPC_BUILD_METADATA: ${{ github.event_name == 'push' && 'true' || 'false' }}
  OPENIPC_GIT_COMMIT: ${{ github.sha }}
  OPENIPC_GIT_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
  VITE_OPENIPC_BUILD_METADATA: ${{ github.event_name == 'push' && 'true' || 'false' }}
  VITE_OPENIPC_GIT_COMMIT: ${{ github.sha }}
  VITE_OPENIPC_GIT_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libclang-dev \
            libdrm-dev \
            libgbm-dev \
            librsvg2-dev \
            libssl-dev \
            libva-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Validate shared versions
        run: |
          python3 <<'PY'
          import json
          import pathlib
          import sys
          import tomllib

          root = pathlib.Path(".")
          expected = tomllib.loads((root / "crates/openipc-core/Cargo.toml").read_text())["package"]["version"]

          cargo_manifests = [
              "apps/nebulus/Cargo.toml",
              "apps/openipc-cli/Cargo.toml",
              "apps/wfb-rs/Cargo.toml",
              "crates/openipc-core/Cargo.toml",
              "crates/openipc-rtl88xx/Cargo.toml",
              "crates/openipc-video/Cargo.toml",
              "crates/openipc-web/Cargo.toml",
              "apps/openipc-station/src-tauri/Cargo.toml",
              "plugins/tauri-plugin-openipc-usb/Cargo.toml",
          ]
          json_files = [
              "crates/openipc-web/package.json",
              "apps/openipc-station/package.json",
              "docs/package.json",
          ]
          bun_lock_files = [
              "apps/openipc-station/bun.lock",
              "docs/bun.lock",
          ]

          errors = []
          for rel in cargo_manifests:
              version = tomllib.loads((root / rel).read_text())["package"]["version"]
              if version != expected:
                  errors.append(f"{rel}: {version} != {expected}")

          for rel in json_files:
              version = json.loads((root / rel).read_text())["version"]
              if version != expected:
                  errors.append(f"{rel}: {version} != {expected}")

          for rel in bun_lock_files:
              path = root / rel
              if not path.is_file():
                  errors.append(f"{rel} is missing")
                  continue
              text = path.read_text()
              if "/api/npm/" in text or "artifacthub" in text or "oraclecorp" in text:
                  errors.append(f"{rel} contains a non-public registry URL")

          npm_locks = sorted(str(path) for path in root.rglob("package-lock.json"))
          if npm_locks:
              errors.append("package-lock.json files are not used; found: " + ", ".join(npm_locks))

          changelog = (root / "CHANGELOG.md").read_text()
          if f"## {expected} " not in changelog and f"## {expected}\n" not in changelog:
              errors.append(f"CHANGELOG.md does not contain a {expected} section")

          if errors:
              print("Version metadata is out of sync:", file=sys.stderr)
              for error in errors:
                  print(f"  - {error}", file=sys.stderr)
              sys.exit(1)

          print(f"All release metadata is at {expected}")
          PY

      - name: Check browser crates
        run: |
          cargo check -p openipc-web --target wasm32-unknown-unknown
          cargo clippy -p openipc-video --target wasm32-unknown-unknown --all-targets --no-deps -- -D warnings
          cargo clippy -p nebulus --target wasm32-unknown-unknown --all-targets --no-deps -- -D warnings

  wasm-package:
    name: WASM SDK Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-tools/
            target/
          key: wasm-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            wasm-cargo-${{ runner.os }}-

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Trunk
        run: |
          if [ "$(trunk --version 2>/dev/null || true)" != "trunk 0.21.14" ]; then
            cargo install trunk --version 0.21.14 --locked --force
          fi
          trunk --version

      - name: Install app dependencies
        working-directory: apps/openipc-station
        run: bun install --frozen-lockfile

      - name: Build station web app
        working-directory: apps/openipc-station
        run: bun run build

      - name: Build Nebulus web app
        working-directory: apps/nebulus
        run: trunk build --release

      - name: Verify Nebulus WASM artifact
        run: |
          python3 <<'PY'
          from pathlib import Path
          import sys

          wasm = list(Path("apps/nebulus/dist").glob("*_bg.wasm"))
          if len(wasm) != 1 or wasm[0].read_bytes()[:4] != b"\0asm":
              print("Nebulus did not produce one valid WASM module", file=sys.stderr)
              sys.exit(1)
          print(f"Validated {wasm[0]}")
          PY

      - name: Verify WASM npm package
        run: bun pm pack --cwd crates/openipc-web/pkg --dry-run

  deploy-station:
    name: Deploy Legacy Station Site
    runs-on: ubuntu-latest
    needs:
      - wasm-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install app dependencies
        working-directory: apps/openipc-station
        run: bun install --frozen-lockfile

      - name: Build legacy station web app
        working-directory: apps/openipc-station
        run: bun run build

      - name: Deploy station to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/openipc-station
          command: pages deploy dist --project-name=openipc-rs-station --branch=master

      - name: Skip station deploy
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Skipping station deploy because Cloudflare secrets are not configured."

  deploy-nebulus:
    name: Deploy Nebulus Web App
    runs-on: ubuntu-latest
    needs:
      - wasm-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-tools/
            target/
          key: nebulus-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            nebulus-cargo-${{ runner.os }}-

      - name: Install Trunk
        run: |
          if [ "$(trunk --version 2>/dev/null || true)" != "trunk 0.21.14" ]; then
            cargo install trunk --version 0.21.14 --locked --force
          fi
          trunk --version

      - name: Build Nebulus web app
        working-directory: apps/nebulus
        run: trunk build --release

      - name: Deploy Nebulus to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/nebulus
          command: pages deploy dist --project-name=nebulus --branch=master

      - name: Skip Nebulus deploy
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Skipping Nebulus deploy because Cloudflare secrets are not configured."

  docs:
    name: Docs Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: bun run build

  deploy-docs:
    name: Deploy Docs Site
    runs-on: ubuntu-latest
    needs:
      - docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: bun run build

      - name: Deploy docs to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          command: pages deploy build --project-name=openipc-rs-docs --branch=master

      - name: Skip docs deploy
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Skipping docs deploy because Cloudflare secrets are not configured."

  desktop:
    name: Desktop Check (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - label: linux-arm64
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
          - label: macos-apple-silicon
            os: macos-15
            rust_target: aarch64-apple-darwin
          - label: macos-intel
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
          - label: windows-x64
            os: windows-2025
            rust_target: x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-11-arm
            rust_target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libclang-dev \
            libdrm-dev \
            libgbm-dev \
            librsvg2-dev \
            libssl-dev \
            libva-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-tools/
            target/
          key: desktop-cargo-${{ matrix.label }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            desktop-cargo-${{ matrix.label }}-

      - name: Test native video backend
        run: cargo test -p openipc-video --target ${{ matrix.rust_target }} --all-targets

      - name: Check Nebulus native app
        run: cargo check -p nebulus --target ${{ matrix.rust_target }} --all-targets

  android:
    name: Android Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"
          yes | sdkmanager --licenses >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown,aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-tools/
            target/
          key: android-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            android-cargo-${{ runner.os }}-

      - name: Check Android video backend
        run: |
          cargo clippy -p openipc-video --target aarch64-linux-android --all-targets --no-deps -- -D warnings
          cargo clippy -p nebulus --target aarch64-linux-android --lib --no-deps -- -D warnings

      - name: Install cargo-apk2
        run: |
          case "$(cargo apk2 --version 2>/dev/null || true)" in
            *" 1.3.11") ;;
            *) cargo install cargo-apk2 --version 1.3.11 --locked --force ;;
          esac
          cargo apk2 --version

      - name: Build Nebulus Android debug APK
        run: cargo apk2 build -p nebulus --lib --target aarch64-linux-android

  publish-crates:
    name: Publish Crates.io Packages
    runs-on: ubuntu-latest
    needs:
      - rust
      - wasm-package
      - docs
      - desktop
      - android
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate crates.io token
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: |
          echo "CARGO_REGISTRY_TOKEN is required to publish crates.io packages." >&2
          exit 1

      - name: Install native video build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libasound2-dev \
            libclang-dev \
            libdrm-dev \
            libgbm-dev \
            libva-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: publish-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            publish-cargo-${{ runner.os }}-

      - name: Validate crate versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for manifest in \
            apps/nebulus/Cargo.toml \
            apps/wfb-rs/Cargo.toml \
            crates/openipc-core/Cargo.toml \
            crates/openipc-rtl88xx/Cargo.toml \
            crates/openipc-video/Cargo.toml \
            crates/openipc-web/Cargo.toml
          do
            CRATE_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' "$manifest" | head -n 1)
            if [ "$CRATE_VERSION" != "$VERSION" ]; then
              echo "$manifest has version $CRATE_VERSION but tag is $VERSION" >&2
              exit 1
            fi
          done

      - name: Publish openipc-rs crates
        run: cargo publish --workspace

  publish-wasm-npm:
    name: Publish WASM SDK To npm
    runs-on: ubuntu-latest
    needs:
      - rust
      - wasm-package
      - docs
      - desktop
      - android
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-tools/
            target/
          key: publish-wasm-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            publish-wasm-cargo-${{ runner.os }}-

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Check Bun
        run: bun --version

      - name: Build WASM SDK package
        run: bun run --cwd crates/openipc-web build

      - name: Install npm for trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Check npm
        run: npm --version

      - name: Publish npm package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -e 'console.log(require("./crates/openipc-web/pkg/package.json").version)')
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "Tag version $VERSION does not match @openipc-rs/web package version $PACKAGE_VERSION" >&2
            exit 1
          fi
          if npm view "@openipc-rs/web@$VERSION" version >/dev/null 2>&1; then
            echo "@openipc-rs/web@$VERSION is already on npm; skipping"
            exit 0
          fi
          npm publish crates/openipc-web/pkg --access public --provenance

  desktop-release:
    name: Nebulus Desktop Release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs:
      - rust
      - wasm-package
      - docs
      - desktop
      - android
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - label: linux-arm64
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
          - label: macos-apple-silicon
            os: macos-15
            rust_target: aarch64-apple-darwin
          - label: macos-intel
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
          - label: windows-x64
            os: windows-2025
            rust_target: x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-11-arm
            rust_target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libclang-dev \
            libdrm-dev \
            libgbm-dev \
            librsvg2-dev \
            libssl-dev \
            libva-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-tools/
            target/
          key: release-desktop-cargo-${{ matrix.label }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-desktop-cargo-${{ matrix.label }}-

      - name: Validate Nebulus version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' apps/nebulus/Cargo.toml | head -n 1)
          test "$PACKAGE_VERSION" = "$VERSION" || {
            echo "Tag version $VERSION does not match Nebulus $PACKAGE_VERSION" >&2
            exit 1
          }

      - name: Build Nebulus
        run: cargo build --release -p nebulus --bin nebulus-desktop --target ${{ matrix.rust_target }}

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="nebulus-${{ matrix.label }}-$VERSION"
          mkdir -p release-assets
          install -m 0755 "target/${{ matrix.rust_target }}/release/nebulus-desktop" "release-assets/$NAME"
          (cd release-assets && sha256sum "$NAME" > "$NAME.sha256")

      - name: Package macOS release
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MARKETING_VERSION="${VERSION%%-*}"
          NAME="nebulus-${{ matrix.label }}-$VERSION"
          ROOT="release-assets/dmg-root"
          APP="$ROOT/Nebulus.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "target/${{ matrix.rust_target }}/release/nebulus-desktop" "$APP/Contents/MacOS/Nebulus"
          cp LICENSE "$APP/Contents/Resources/LICENSE"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleDisplayName</key><string>Nebulus</string>
            <key>CFBundleExecutable</key><string>Nebulus</string>
            <key>CFBundleIdentifier</key><string>dev.neels.openipc.nebulus</string>
            <key>CFBundleName</key><string>Nebulus</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>$MARKETING_VERSION</string>
            <key>CFBundleVersion</key><string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          codesign --force --deep --sign - "$APP"
          ln -s /Applications "$ROOT/Applications"
          hdiutil create -volname Nebulus -srcfolder "$ROOT" -ov -format UDZO "release-assets/$NAME.dmg"
          (cd release-assets && shasum -a 256 "$NAME.dmg" > "$NAME.dmg.sha256")
          rm -rf "$ROOT"

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco upgrade innosetup --version=6.7.1 --yes --no-progress

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME.TrimStart('v')
          $Name = "nebulus-${{ matrix.label }}-$Version"
          $Architecture = if ('${{ matrix.rust_target }}' -eq 'aarch64-pc-windows-msvc') { 'arm64' } else { 'x64os' }
          $RepoDir = (Get-Location).Path
          $SourceDir = Join-Path $RepoDir "target/${{ matrix.rust_target }}/release"
          $OutputDir = Join-Path $RepoDir 'release-assets'
          $Compiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6/ISCC.exe'
          New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null
          if (!(Test-Path $Compiler)) {
            throw "Inno Setup compiler not found at $Compiler"
          }
          & $Compiler /Qp "/DAppVersion=$Version" "/DSourceDir=$SourceDir" "/DRepoDir=$RepoDir" "/DArchitecture=$Architecture" "/DOutputDir=$OutputDir" "/DOutputName=$Name" "apps/nebulus/packaging/windows/Nebulus.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $Hash = (Get-FileHash "release-assets/$Name.exe" -Algorithm SHA256).Hash.ToLower()
          "$Hash  $Name.exe" | Set-Content "release-assets/$Name.exe.sha256"

      - name: Upload desktop release artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebulus-${{ matrix.label }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  android-release:
    name: Nebulus Android Release
    runs-on: ubuntu-latest
    needs:
      - rust
      - wasm-package
      - docs
      - desktop
      - android
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"
          yes | sdkmanager --licenses >/dev/null
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-tools/
            target/
          key: release-android-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-android-cargo-${{ runner.os }}-

      - name: Install cargo-apk2
        run: |
          case "$(cargo apk2 --version 2>/dev/null || true)" in
            *" 1.3.11") ;;
            *) cargo install cargo-apk2 --version 1.3.11 --locked --force ;;
          esac
          cargo apk2 --version

      - name: Prepare Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          KEYSTORE="$RUNNER_TEMP/nebulus-release.keystore"
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
            PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          else
            PASSWORD="openipc-ci-release"
            keytool -genkeypair -noprompt \
              -keystore "$KEYSTORE" \
              -storepass "$PASSWORD" \
              -keypass "$PASSWORD" \
              -alias nebulus \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Nebulus CI, OU=OpenIPC, O=openipc-rs, C=US"
            echo "ANDROID_KEYSTORE_BASE64/ANDROID_KEYSTORE_PASSWORD are unset; using an ephemeral CI signing key. This APK cannot upgrade a differently signed installation." >&2
          fi
          echo "CARGO_APK_RELEASE_KEYSTORE=$KEYSTORE" >> "$GITHUB_ENV"
          echo "CARGO_APK_RELEASE_KEYSTORE_PASSWORD=$PASSWORD" >> "$GITHUB_ENV"

      - name: Build Nebulus Android APK
        run: cargo apk2 build --release -p nebulus --lib

      - name: Stage Android release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="release-assets/android"
          mkdir -p "$OUT_DIR"
          APK=$(find target/release/apk -maxdepth 1 -type f -name '*.apk' ! -name '*-unaligned.apk' -print -quit)
          if [ -z "$APK" ]; then
            echo "cargo-apk2 did not produce a release APK." >&2
            find target -type f -name '*.apk' -print >&2 || true
            exit 1
          fi
          for ABI in arm64-v8a armeabi-v7a x86_64 x86; do
            unzip -Z1 "$APK" | grep -Eq "^lib/$ABI/.*\\.so$" || {
              echo "Universal APK is missing native libraries for $ABI." >&2
              exit 1
            }
          done
          NAME="nebulus-android-universal-$VERSION.apk"
          cp "$APK" "$OUT_DIR/$NAME"
          (cd "$OUT_DIR" && sha256sum "$NAME" > "$NAME.sha256")

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: nebulus-android-universal
          path: release-assets/android/*
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: Publish Nebulus GitHub Release
    runs-on: ubuntu-latest
    needs:
      - desktop-release
      - android-release
      - publish-crates
      - publish-wasm-npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nebulus-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nebulus ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/*
          fail_on_unmatched_files: true
