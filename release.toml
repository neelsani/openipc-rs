allow-branch = ["master"]
consolidate-commits = true
dependent-version = "upgrade"
shared-version = true
tag-name = "v{{version}}"
pre-release-commit-message = "chore: release v{{version}}"
tag-message = "v{{version}}"
pre-release-hook = [
  "bash",
  "-c",
  '''
set -euo pipefail

if [ "${CRATE_NAME:-}" != "nebulus" ]; then
  exit 0
fi

if [ "${DRY_RUN:-false}" = "true" ]; then
  echo "dry run: would sync Bun package versions and lockfiles"
  exit 0
fi

bun pm version "$NEW_VERSION" --cwd "$WORKSPACE_ROOT/crates/openipc-web" --no-git-tag-version --allow-same-version --force
bun pm version "$NEW_VERSION" --cwd "$WORKSPACE_ROOT/docs" --no-git-tag-version --allow-same-version --force

bun install --cwd "$WORKSPACE_ROOT/docs" --lockfile-only --registry https://registry.npmjs.org/

if ! command -v git-cliff >/dev/null 2>&1; then
  echo "git-cliff is required for changelog generation. Install it with: cargo install git-cliff" >&2
  exit 1
fi

if git -C "$WORKSPACE_ROOT" rev-parse "v$PREV_VERSION" >/dev/null 2>&1; then
  git-cliff \
    --config "$WORKSPACE_ROOT/cliff.toml" \
    --repository "$WORKSPACE_ROOT" \
    --tag "v$NEW_VERSION" \
    --prepend "$WORKSPACE_ROOT/CHANGELOG.md" \
    "v$PREV_VERSION..HEAD"
else
  git-cliff \
    --config "$WORKSPACE_ROOT/cliff.toml" \
    --repository "$WORKSPACE_ROOT" \
    --tag "v$NEW_VERSION" \
    --prepend "$WORKSPACE_ROOT/CHANGELOG.md" \
    --unreleased
fi

''',
]
publish = false
push = true
tag = true
