allow-branch = ["master"]
consolidate-commits = true
dependent-version = "upgrade"
shared-version = true
tag-name = "v{{version}}"
pre-release-commit-message = "chore: release v{{version}}"
tag-message = "v{{version}}"
pre-release-replacements = [
  {file = "crates/openipc-web/package.json", search = '"version": ".*"', replace = '"version": "{{version}}"'},
  {file = "apps/openipc-station/package.json", search = '"version": ".*"', replace = '"version": "{{version}}"'},
  {file = "apps/openipc-station/package-lock.json", search = '"version": ".*"', replace = '"version": "{{version}}"'},
  {file = "docs/package-lock.json", search = '"version": ".*"', replace = '"version": "{{version}}"'},
  {file = "docs/package.json", search = '"version": ".*"', replace = '"version": "{{version}}"'},
  {file = "CHANGELOG", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}"},
  {file = "CHANGELOG", search = "\\[Unreleased\\]: https://github\\.com/neelsani/openipc-rs/compare/v(.+)\\.\\.\\.HEAD", replace = "[Unreleased]: https://github.com/neelsani/openipc-rs/compare/v{{version}}...HEAD\n[{{version}}]: https://github.com/neelsani/openipc-rs/compare/v$1...v{{version}}"},
]
publish = false
push = false
tag = true