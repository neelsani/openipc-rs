name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  # A master run can publish a release, so never cancel it midway through.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  OPENIPC_BUILD_METADATA: ${{ github.event_name == 'push' && 'true' || 'false' }}
  OPENIPC_GIT_COMMIT: ${{ github.sha }}
  OPENIPC_GIT_TAG: ""
  VITE_OPENIPC_BUILD_METADATA: ${{ github.event_name == 'push' && 'true' || 'false' }}
  VITE_OPENIPC_GIT_COMMIT: ${{ github.sha }}
  VITE_OPENIPC_GIT_TAG: ""

jobs:
  context:
    name: Build Context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout with tags
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect cargo-release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          TAG=""
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/master" ]; then
            mapfile -t TAGS < <(git tag --points-at "$GITHUB_SHA" --list 'v*')
            if [ "${#TAGS[@]}" -gt 1 ]; then
              printf 'Multiple release tags point at %s: %s\n' "$GITHUB_SHA" "${TAGS[*]}" >&2
              exit 1
            fi
            TAG="${TAGS[0]:-}"
            if [ -n "$TAG" ] && [ "$(git cat-file -t "$TAG")" != "tag" ]; then
              echo "$TAG must be an annotated cargo-release tag." >&2
              exit 1
            fi
            if [ -n "$TAG" ]; then
              python3 scripts/validate-versions.py --tag "$TAG"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$TAG" ]; then
            echo "Release $TAG detected for $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Validation build; no release tag detected." >> "$GITHUB_STEP_SUMMARY"
          fi

  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libclang-dev \
            libdrm-dev \
            libgbm-dev \
            librsvg2-dev \
            libssl-dev \
            libva-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --no-deps --locked -- -D warnings

      - name: Test
        run: |
          cargo test --workspace --all-targets --locked
          cargo test -p nebulus --bin nebulus-decode-worker --features web-decode-worker --locked

      - name: Validate shared versions
        run: python3 scripts/validate-versions.py

      - name: Check browser crates
        run: |
          cargo check -p openipc-web --target wasm32-unknown-unknown --locked
          cargo clippy -p openipc-uplink --target wasm32-unknown-unknown --all-targets --no-deps --locked -- -D warnings
          cargo clippy -p openipc-video --target wasm32-unknown-unknown --all-targets --no-deps --locked -- -D warnings
          cargo clippy -p nebulus --target wasm32-unknown-unknown --all-targets --features web-decode-worker --no-deps --locked -- -D warnings

  web:
    name: Nebulus Web And WASM SDK
    runs-on: ubuntu-latest
    needs: context
    env:
      OPENIPC_GIT_TAG: ${{ needs.context.outputs.release_tag }}
      VITE_OPENIPC_GIT_TAG: ${{ needs.context.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: web-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            web-cargo-${{ runner.os }}-

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Trunk
        run: |
          if [ "$(trunk --version 2>/dev/null || true)" != "trunk 0.21.14" ]; then
            cargo install trunk --version 0.21.14 --locked --force
          fi
          trunk --version

      - name: Build WASM SDK package
        run: bun run --cwd crates/openipc-web build

      - name: Verify WASM npm package
        run: bun pm pack --cwd crates/openipc-web/pkg --dry-run

      - name: Build Nebulus web app
        working-directory: apps/nebulus
        run: trunk build --release

      - name: Verify Nebulus WASM artifact
        run: |
          python3 <<'PY'
          from pathlib import Path
          import sys

          root = Path("apps/nebulus/dist")
          wasm = sorted(root.rglob("*_bg.wasm"))
          expected = {"nebulus-decode-worker_bg.wasm"}
          names = {path.name for path in wasm}
          main = [path for path in wasm if path.name not in expected]
          if len(main) != 1 or not expected.issubset(names):
              print(f"Nebulus produced unexpected WASM modules: {sorted(names)}", file=sys.stderr)
              sys.exit(1)
          invalid = [path for path in wasm if path.read_bytes()[:4] != b"\0asm"]
          if invalid:
              print(f"Invalid Nebulus WASM modules: {invalid}", file=sys.stderr)
              sys.exit(1)
          loader = root / "nebulus-decode-worker_loader.js"
          if not loader.is_file():
              print("Nebulus decode-worker loader is missing", file=sys.stderr)
              sys.exit(1)
          print(f"Validated {len(wasm)} Nebulus WASM modules and worker loader")
          PY

      - name: Upload Nebulus site
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: site-nebulus
          path: apps/nebulus/dist
          if-no-files-found: error
          retention-days: 3

  docs:
    name: Docs Site
    runs-on: ubuntu-latest
    needs: context
    env:
      OPENIPC_GIT_TAG: ${{ needs.context.outputs.release_tag }}
      VITE_OPENIPC_GIT_TAG: ${{ needs.context.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: bun run build

      - name: Upload docs site
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: site-docs
          path: docs/build
          if-no-files-found: error
          retention-days: 3

  desktop:
    name: Desktop Check (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - label: linux-arm64
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
          - label: macos-apple-silicon
            os: macos-15
            rust_target: aarch64-apple-darwin
          - label: macos-intel
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
          - label: windows-x64
            os: windows-2025
            rust_target: x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-11-arm
            rust_target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libclang-dev \
            libdrm-dev \
            libgbm-dev \
            librsvg2-dev \
            libssl-dev \
            libva-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: desktop-cargo-${{ matrix.label }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            desktop-cargo-${{ matrix.label }}-

      - name: Test native video backend
        run: cargo test -p openipc-video --target ${{ matrix.rust_target }} --all-targets --locked

      - name: Check Nebulus native app
        run: cargo check -p nebulus --target ${{ matrix.rust_target }} --all-targets --locked

  android:
    name: Android Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"
          yes | sdkmanager --licenses >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          NDK_BIN="$ANDROID_HOME/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CC_aarch64_linux_android=$NDK_BIN/aarch64-linux-android26-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$NDK_BIN/llvm-ar" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown,aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: android-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            android-cargo-${{ runner.os }}-

      - name: Check Android video backend
        run: |
          cargo clippy -p openipc-video --target aarch64-linux-android --all-targets --no-deps --locked -- -D warnings
          cargo clippy -p nebulus --target aarch64-linux-android --lib --no-deps --locked -- -D warnings

      - name: Install cargo-apk2
        run: |
          case "$(cargo apk2 --version 2>/dev/null || true)" in
            *" 1.3.11") ;;
            *) cargo install cargo-apk2 --version 1.3.11 --locked --force ;;
          esac
          cargo apk2 --version

      - name: Build Nebulus Android debug APK
        run: cargo apk2 build -p nebulus --lib --target aarch64-linux-android

  deploy-sites:
    name: Deploy ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs:
      - context
      - rust
      - web
      - docs
      - desktop
      - android
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Nebulus
            artifact: site-nebulus
            download_path: apps/nebulus/dist
            working_directory: apps/nebulus
            output_directory: dist
            project: nebulus
          - name: Docs
            artifact: site-docs
            download_path: docs/build
            working_directory: docs
            output_directory: build
            project: openipc-rs-docs

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Bun
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.download_path }}

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: ${{ matrix.working_directory }}
          command: pages deploy ${{ matrix.output_directory }} --project-name=${{ matrix.project }} --branch=master

      - name: Skip deploy without Cloudflare secrets
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo "Skipping ${{ matrix.name }} because Cloudflare secrets are not configured."

  release:
    name: Release ${{ needs.context.outputs.release_tag }}
    needs:
      - context
      - rust
      - web
      - docs
      - desktop
      - android
      - deploy-sites
    if: needs.context.outputs.release_tag != ''
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.context.outputs.release_tag }}
      commit: ${{ github.sha }}
    secrets: inherit
